<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Wormhole</title>
    <style>
        html, body {
            margin: 0;
            overflow: hidden;
            background-color: #03020a;
            height: 100%;
            cursor: none;
        }
        canvas {
            display: block;
        }
        #vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.0) 0%, rgba(3,2,10,0) 35%, rgba(3,2,10,0.55) 78%, rgba(3,2,10,0.95) 100%);
            mix-blend-mode: normal;
            z-index: 5;
        }
        #hint {
            position: fixed;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.55);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 12px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            z-index: 6;
            transition: opacity 1.2s ease;
            pointer-events: none;
        }
        
        #cursor-dot, #cursor-ring {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            will-change: transform;
        }

        #cursor-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(180,140,255,0.9) 45%, rgba(180,140,255,0) 75%);
            box-shadow: 0 0 18px 4px rgba(180,120,255,0.65), 0 0 4px 1px #fff;
            z-index: 8;
        }

        #cursor-ring {
            width: 40px;  
            height: 40px; 
            z-index: 7;
            overflow: visible;
        }

        #cursor-ring .track {
            fill: none;
            stroke: rgba(255,255,255,0.18);
            stroke-width: 2;
        }
        #cursor-ring .progress {
            fill: none;
            stroke: #ffffff;
            stroke-width: 2.5;
            stroke-linecap: round;
            filter: drop-shadow(0 0 6px rgba(180,120,255,0.9));
            transform-origin: 20px 20px;
            transform: rotate(-90deg);
        }
        #cursor-ring .flash {
            fill: none;
            stroke: #ffffff;
            stroke-width: 2;
            opacity: 0;
            transform-origin: 20px 20px;
        }
        #cursor-ring.releasing .flash {
            opacity: 0.9;
            animation: ringFlash 0.55s cubic-bezier(0.15, 0.8, 0.25, 1) forwards;
        }
        @keyframes ringFlash {
            0%   { transform: scale(1); opacity: 0.9; stroke-width: 3; }
            100% { transform: scale(2.2); opacity: 0; stroke-width: 0.5; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="vignette"></div>
    <div id="hint">Tieni premuto e rilascia per l'iperspazio</div>
    <div id="cursor-dot"></div>
    <svg id="cursor-ring" viewBox="0 0 40 40">
        <circle class="track" cx="20" cy="20" r="17"></circle>
        <circle class="flash" cx="20" cy="20" r="17"></circle>
        <circle class="progress" id="cursor-ring-progress" cx="20" cy="20" r="17"
                stroke-dasharray="106.81" stroke-dashoffset="106.81"></circle>
    </svg>

    <script>
        // ============ SETUP SCENA E TELECAMERA ============
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x03020a, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        function makeGlowTexture(hardness) {
            const c = document.createElement('canvas');
            c.width = 128; c.height = 128;
            const ctx = c.getContext('2d');
            const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            g.addColorStop(0, 'rgba(255,255,255,1)');
            g.addColorStop(hardness, 'rgba(255,255,255,0.6)');
            g.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, 128, 128);
            return new THREE.CanvasTexture(c);
        }
        const t_stella = makeGlowTexture(0.25);
        const t_streak = makeGlowTexture(0.05);

        const colorPalettes = [
            new THREE.Color(0x9b30ff), 
            new THREE.Color(0xff2fa0), 
            new THREE.Color(0x2f6bff), 
            new THREE.Color(0x4fe8ff), 
            new THREE.Color(0xffffff), 
            new THREE.Color(0xffd24f)  
        ];
        const weights = [0.24, 0.22, 0.22, 0.16, 0.14, 0.02];

        function pickColor() {
            const r = Math.random();
            let acc = 0;
            for (let i = 0; i < weights.length; i++) {
                acc += weights[i];
                if (r <= acc) return colorPalettes[i];
            }
            return colorPalettes[colorPalettes.length - 1];
        }

        // ============ TUNNEL PRINCIPALE DI PARTICELLE ============
        const TUNNEL_LEN = 200; 
        const particelleConteggio = 11000; 
        const geometry = new THREE.BufferGeometry();
        const posizioni = new Float32Array(particelleConteggio * 3);
        const basePositions = new Float32Array(particelleConteggio * 3); 
        const colori = new Float32Array(particelleConteggio * 3);
        const dimensioni = new Float32Array(particelleConteggio);

        function seedParticle(i3, i, randomZ = true) {
            const raggio = 3.5 + Math.pow(Math.random(), 1.6) * 7.5;
            const angolo = Math.random() * Math.PI * 2;
            
      
            basePositions[i3 + 0] = Math.cos(angolo) * raggio;
            basePositions[i3 + 1] = Math.sin(angolo) * raggio;
            basePositions[i3 + 2] = randomZ ? (Math.random() * -TUNNEL_LEN) : (-TUNNEL_LEN * Math.random());

            posizioni[i3 + 0] = basePositions[i3 + 0];
            posizioni[i3 + 1] = basePositions[i3 + 1];
            posizioni[i3 + 2] = basePositions[i3 + 2];

            const c = pickColor();
            colori[i3 + 0] = c.r; colori[i3 + 1] = c.g; colori[i3 + 2] = c.b;
            dimensioni[i] = 0.18 + Math.random() * 0.55;
        }
        for (let i = 0; i < particelleConteggio; i++) seedParticle(i * 3, i, true);

        geometry.setAttribute('position', new THREE.BufferAttribute(posizioni, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colori, 3));

        const material = new THREE.PointsMaterial({
            size: 0.4, map: t_stella, transparent: true, blending: THREE.AdditiveBlending, vertexColors: true, depthWrite: false
        });
        const wormhole = new THREE.Points(geometry, material);
        scene.add(wormhole);

        // ============ STRATO 2: STREAK LUMINOSE ============
        const streakCount = 800; 
        const streakGeo = new THREE.BufferGeometry();
        const streakPos = new Float32Array(streakCount * 3);
        const baseStreakPos = new Float32Array(streakCount * 3);
        const streakCol = new Float32Array(streakCount * 3);
        for (let i = 0; i < streakCount; i++) {
            const i3 = i * 3;
            const raggio = 1.5 + Math.random() * 3.5;
            const angolo = Math.random() * Math.PI * 2;
            baseStreakPos[i3 + 0] = Math.cos(angolo) * raggio;
            baseStreakPos[i3 + 1] = Math.sin(angolo) * raggio;
            baseStreakPos[i3 + 2] = Math.random() * -TUNNEL_LEN;

            streakPos[i3 + 0] = baseStreakPos[i3 + 0];
            streakPos[i3 + 1] = baseStreakPos[i3 + 1];
            streakPos[i3 + 2] = baseStreakPos[i3 + 2];

            const c = pickColor();
            streakCol[i3 + 0] = c.r; streakCol[i3 + 1] = c.g; streakCol[i3 + 2] = c.b;
        }
        streakGeo.setAttribute('position', new THREE.BufferAttribute(streakPos, 3));
        streakGeo.setAttribute('color', new THREE.BufferAttribute(streakCol, 3));
        const streakMat = new THREE.PointsMaterial({
            size: 0.12, map: t_streak, transparent: true, blending: THREE.AdditiveBlending, vertexColors: true, depthWrite: false, opacity: 0.9
        });
        const streaks = new THREE.Points(streakGeo, streakMat);
        scene.add(streaks);

        // ============ STRATO 3: CAMPO STELLARE DI SFONDO ============
        const bgCount = 1800;
        const bgGeo = new THREE.BufferGeometry();
        const bgPos = new Float32Array(bgCount * 3);
        for (let i = 0; i < bgCount; i++) {
            const i3 = i * 3;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            const r = 90 + Math.random() * 60;
            bgPos[i3 + 0] = r * Math.sin(phi) * Math.cos(theta);
            bgPos[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            bgPos[i3 + 2] = -Math.abs(r * Math.cos(phi)) - 20;
        }
        bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
        const bgMat = new THREE.PointsMaterial({
            size: 0.5, map: t_stella, color: 0xffffff, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending, depthWrite: false
        });
        const bgStars = new THREE.Points(bgGeo, bgMat);
        scene.add(bgStars);

        // ============ NUCLEO CENTRALE LUMINOSO ============
        const coreSprite = new THREE.Sprite(new THREE.SpriteMaterial({
            map: t_stella, color: 0xffffff, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.85
        }));
        coreSprite.scale.set(3, 3, 1);
        coreSprite.position.set(0, 0, -TUNNEL_LEN + 32);
        scene.add(coreSprite);

        const coreSprite2 = new THREE.Sprite(new THREE.SpriteMaterial({
            map: t_stella, color: 0x9b30ff, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.5
        }));
        coreSprite2.scale.set(7, 7, 1);
        coreSprite2.position.copy(coreSprite.position);
        scene.add(coreSprite2);

        
        camera.position.set(0, 0, 5);

        // ============ INTERAZIONE MOUSE ============
        let targetMouseX = 0, targetMouseY = 0;
        let currentMouseX = 0, currentMouseY = 0;
        let baseSpeed = 0.6;
        let speed = baseSpeed;
        let boost = 0;        
        let charge = 0;       
        let isHolding = false;

        const cursorDot = document.getElementById('cursor-dot');
        const cursorRing = document.getElementById('cursor-ring');
        const ringProgress = document.getElementById('cursor-ring-progress');
        const hint = document.getElementById('hint');
        const maxStrokeOffset = 106.81; 

        function moveCursor(x, y) {
            cursorDot.style.transform = `translate3d(${x - 7}px, ${y - 7}px, 0)`;  
            cursorRing.style.transform = `translate3d(${x - 20}px, ${y - 20}px, 0)`; 
        }
        moveCursor(window.innerWidth / 2, window.innerHeight / 2);

        document.addEventListener('mousemove', (event) => {
            targetMouseX = (event.clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            targetMouseY = (event.clientY - window.innerHeight / 2) / (window.innerHeight / 2);
            moveCursor(event.clientX, event.clientY);
        });

        function startHold() { isHolding = true; charge = 0; cursorRing.classList.remove('releasing'); hint.style.opacity = '0'; }
        function releaseHold() {
            if (!isHolding) return; isHolding = false; boost = 0.8 + charge * 2.4; charge = 0;
            ringProgress.style.strokeDashoffset = maxStrokeOffset; cursorRing.classList.add('releasing');
            setTimeout(() => cursorRing.classList.remove('releasing'), 600);
        }
        document.addEventListener('mousedown', startHold);
        document.addEventListener('mouseup', releaseHold);
        document.addEventListener('mouseleave', releaseHold);

        // ============ LOOP DI ANIMAZIONE CON CURVATURA GEOMETRICA DEL TUNNEL ============
        const clock = new THREE.Clock();
        let hueShift = 0;

        function updateStream(renderPositions, basePositionsArray, count, radiusMin, radiusRange, speedMul) {
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                
                // 1. Facciamo scorrere la coordinata Z originale
                basePositionsArray[i3 + 2] += speed * speedMul;

                
                if (basePositionsArray[i3 + 2] > 5) {
                    basePositionsArray[i3 + 2] = -TUNNEL_LEN + (Math.random() * (TUNNEL_LEN * 0.6));
                    const raggio = radiusMin + Math.random() * radiusRange;
                    const angolo = Math.random() * Math.PI * 2;
                    basePositionsArray[i3 + 0] = Math.cos(angolo) * raggio;
                    basePositionsArray[i3 + 1] = Math.sin(angolo) * raggio;
                }

                // 2. Calcoliamo la flessione matematica
           
                const factor = Math.min(1, Math.abs(basePositionsArray[i3 + 2]) / TUNNEL_LEN);
                const curvaturaForza = Math.pow(1 - factor, 2.5) * 14.0; 

              
                renderPositions[i3 + 0] = basePositionsArray[i3 + 0] + (currentMouseX * curvaturaForza);
                renderPositions[i3 + 1] = basePositionsArray[i3 + 1] - (currentMouseY * curvaturaForza);
                renderPositions[i3 + 2] = basePositionsArray[i3 + 2];
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const t = clock.getElapsedTime();

            currentMouseX += (targetMouseX - currentMouseX) * 0.06;
            currentMouseY += (targetMouseY - currentMouseY) * 0.06;

            if (isHolding) {
                charge = Math.min(1, charge + dt / 1.15);
                ringProgress.style.strokeDashoffset = maxStrokeOffset - (charge * maxStrokeOffset);
            }

            boost *= 0.955;
            const anticipationSlow = isHolding ? (1 - charge * 0.65) : 1;
            speed = (baseSpeed + boost * 6) * anticipationSlow;

            const pinch = 1 - charge * 0.16 + Math.min(boost, 1.5) * 0.05;
            wormhole.scale.set(pinch, pinch, 1);
            streaks.scale.set(pinch, pinch, 1);

            
            updateStream(wormhole.geometry.attributes.position.array, basePositions, particelleConteggio, 3.5, 7.5, 1);
            wormhole.geometry.attributes.position.needsUpdate = true;

            updateStream(streaks.geometry.attributes.position.array, baseStreakPos, streakCount, 1.5, 3.5, 1.8);
            streaks.geometry.attributes.position.needsUpdate = true;

            wormhole.rotation.z += (0.0025 + boost * 0.012) * anticipationSlow;
            streaks.rotation.z -= (0.0018 + boost * 0.01) * anticipationSlow;

            
            camera.fov = 75 - boost * 10 + charge * 6;
            camera.updateProjectionMatrix();
            camera.lookAt(0, 0, -10);

            coreSprite.position.x = currentMouseX * 1.5;
            coreSprite.position.y = -currentMouseY * 1.5;
            coreSprite2.position.copy(coreSprite.position);

            const pulse = 1 + Math.sin(t * (1.6 + charge * 4)) * (0.15 + charge * 0.25) + boost * 0.7;
            coreSprite.scale.set(3 * pulse, 3 * pulse, 1);
            coreSprite2.scale.set(7 * (1 + Math.sin(t * 1.1) * 0.1) * (1 + boost * 0.35), 7 * (1 + Math.sin(t * 1.1) * 0.1) * (1 + boost * 0.35), 1);

            hueShift += dt * 0.05;
            coreSprite2.material.color.setHSL(hueShift % 1, 0.8, 0.55);

            bgStars.rotation.y += 0.0002;
            bgStars.rotation.x += 0.0001;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
